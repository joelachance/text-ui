<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text-ui logo preview</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      h1 {
        font-size: 1rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1rem;
        color: #737373;
        font-size: 0.875rem;
      }
      .panel {
        padding: 2rem;
        min-height: 50vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
      }
      .light {
        --foreground: #0a0a0a;
        background: #fafafa;
        color: var(--foreground);
      }
      .dark {
        --foreground: #fafafa;
        background: #171717;
        color: var(--foreground);
      }
      .logo-wrap {
        width: 120px;
        height: 120px;
      }
      .logo-wrap svg {
        display: block;
        width: 120px;
        height: 120px;
      }
    </style>
  </head>
  <body>
    <section class="panel light">
      <h1>Light background</h1>
      <p>Same SVG as <code>directory-entry.example.json</code> — <code>--foreground</code> on light UI.</p>

      </div>
    </section>
    <section class="panel dark">
      <h1>Dark background</h1>
      <p><code>--foreground</code> inverted for dark UI.</p>
      <div class="logo-wrap" aria-hidden="true">
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120' fill='none'><rect width='120' height='120' rx='24' fill='var(--foreground, currentColor)' fill-opacity='0.08'/><g transform='translate(35.64 45.3)'><g transform='translate(24.36 14.7) scale(1 -1) translate(-24.36 -14.7)'><path fill='var(--foreground, currentColor)' d='M13.65 -0.67C17.43 -0.67 20.16 2.14 20.16 5.96L20.16 21.42C20.16 23.06 21.46 24.36 23.1 24.36C24.53 24.4 25.62 25.49 25.62 26.88C25.62 28.27 24.53 29.36 23.1 29.4L4.2 29.4C2.77 29.36 1.68 28.27 1.68 26.88C1.68 25.49 2.77 24.4 4.2 24.36C5.84 24.36 7.14 23.06 7.14 21.42L7.14 5.96C7.14 2.14 9.87 -0.67 13.65 -0.67ZM28.98 27.55L28.98 7.98C28.98 3.19 32.17 0 36.96 0L44.94 0L44.94 0.04C46.16 0.25 47.04 1.3 47.04 2.52C47.04 3.74 46.16 4.79 44.94 5L44.94 5.04C43.3 5.04 42 6.34 42 7.98L42 16.38C42 18.02 43.3 19.32 44.94 19.32C46.37 19.36 47.46 20.45 47.46 21.84C47.46 23.23 46.37 24.36 44.94 24.36L37.38 24.36C35.2 24.36 34.02 25.49 34.02 27.55C34.02 28.98 32.84 30.07 31.5 30.07C30.11 30.07 28.98 28.98 28.98 27.55Z'/></g></g></svg>
      </div>
    </section>
  </body>
</html>
